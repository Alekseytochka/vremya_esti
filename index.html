<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Варианты лендинга</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f3f3;
      margin: 0;
      padding: 40px;
      color: #111;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      background: #fff;
      padding: 40px;
      border-radius: 18px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.08);
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 34px;
    }

    p {
      font-size: 18px;
      color: #555;
      margin-bottom: 32px;
    }

    .button {
      display: block;
      max-width: 360px;
      margin: 16px auto;
      padding: 18px 24px;
      background: #111;
      color: #fff;
      text-decoration: none;
      border-radius: 12px;
      font-size: 18px;
      transition: 0.2s;
    }

    .button:hover {
      background: #333;
    }

    .note {
      margin-top: 30px;
      font-size: 14px;
      color: #777;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Варианты лендинга</h1>
    <p>Выберите один из двух вариантов для просмотра.</p>

    <a class="button" href="variant-1/">Открыть вариант №1</a>
    <a class="button" href="variant-2/">Открыть вариант №2</a>

    <div class="note">
      Демо-страница для согласования структуры и визуальной подачи.
    </div>
  </div>

</body>
</html>
